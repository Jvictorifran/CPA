  <rect x="75" y="168" width="240" height="14" rx="2" fill="#e2e5e3"/>
  <rect x="75" y="186" width="180" height="14" rx="2" fill="#e2e5e3"/>
  <text x="75" y="212" class="label" font-size="9">Headline (h1) — 2 linhas</text>

  <rect x="75" y="225" width="250" height="10" rx="2" fill="#f1f3f2"/>
