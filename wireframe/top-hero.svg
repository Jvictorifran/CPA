<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <style>
    text { font-family: 'Inter', system-ui, sans-serif; }
    .label { fill: #6b756d; font-size: 11px; }
    .heading { fill: #0f1720; font-weight: 700; }
    .box { stroke: #c9ceca; stroke-width: 1.5; fill: #f8faf9; rx: 8; }
    .accent { stroke: #1f6b4f; stroke-width: 2; fill: #eaf7ef; rx: 8; }
    .btn { fill: #1a5240; rx: 6; }
    .btn-text { fill: white; font-size: 10px; font-weight: 600; }
    .arrow { stroke: #38a169; stroke-width: 2; marker-end: url(#arrowhead); }
    .divider { stroke: #e2e5e3; stroke-width: 1; stroke-dasharray: 4 4; }
    .section-label { fill: #1f6b4f; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" class="heading" font-size="18">CPA Landing Page — Wireframe: Mobile → Desktop</text>

  <!-- ==================== MOBILE (left side) ==================== -->
  <text x="200" y="65" text-anchor="middle" class="section-label" font-size="14">📱 MOBILE (375px)</text>

  <!-- Mobile Container -->
  <rect x="60" y="80" width="280" height="680" class="box" fill="white"/>

  <!-- Mobile Header -->
